# nginx config for the ClinicalMatch PWA (single-page app).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Never cache the service worker or the app shell, so PWA updates land
    # promptly instead of being pinned to a stale cached copy.
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Content-hashed build assets are immutable — cache them aggressively.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA fallback: react-router owns client-side routes, so any unknown path
    # returns index.html instead of a 404.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
